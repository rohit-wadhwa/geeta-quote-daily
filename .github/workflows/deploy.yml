name: Deploy Chrome Extension to Store

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          zip -r extension.zip * \
            -x "*.git*" \
            -x "*.github*" \
            -x "node_modules/*" \
            -x "demo/*" \
            -x "newsletters/*" \
            -x "newsletters/**/*" \
            -x "*.md" \
            -x "*.iml" \
            -x ".vercelignore" \
            -x "vercel.json" \
            -x "LICENSE"

      - name: Upload & Publish to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'publish'
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_APP_ID }}
          zip_file: './extension.zip'
