name: Deploy Chrome Extension to Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 2.1.0). Leave empty to deploy current manifest version as-is.'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version in manifest
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" manifest.json
          echo "Updated manifest.json to version ${VERSION}"
          grep '"version"' manifest.json

      - name: Package Extension
        run: |
          zip -r extension.zip * \
            -x "*.git*" \
            -x "*.github*" \
            -x "node_modules/*" \
            -x "audio/track-*.mp3" \
            -x "demo/*" \
            -x "newsletters/*" \
            -x "newsletters/**/*" \
            -x "*.md" \
            -x "*.iml" \
            -x ".vercelignore" \
            -x "vercel.json" \
            -x "LICENSE"

      - name: Upload & Publish to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'publish'
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_APP_ID }}
          zip_file: './extension.zip'
